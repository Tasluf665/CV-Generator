version: '3.8'

services:
  backend:
    build: ./jobflow-backend
    ports:
      - "3001:3001"
    env_file:
      - ./jobflow-backend/.env
    volumes:
      - ./jobflow-backend:/app
      - /app/node_modules

  frontend:
    build: ./jobflow-frontend
    ports:
      - "5174:5174"
    env_file:
      - ./jobflow-frontend/.env
    volumes:
      - ./jobflow-frontend:/app
      - /app/node_modules
    depends_on:
      - backend
